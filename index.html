<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Своя игра | Ведущий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a237e, #311b92);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 2px solid #5c6bc0;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #ffeb3b;
            text-shadow: 3px 3px 0 #3f51b5;
        }

        .game-area {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* ИГРОВОЕ ПОЛЕ */
        .game-board {
            flex: 3;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            border: 3px solid #3949ab;
        }

        .topics-row {
            display: flex;
            margin-bottom: 15px;
        }

        .topic {
            flex: 1;
            text-align: center;
            padding: 20px 10px;
            background: #3949ab;
            margin: 0 5px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.4rem;
            border-bottom: 5px solid #283593;
            cursor: default;
            text-shadow: 1px 1px 2px black;
        }

        .questions-grid {
            display: flex;
        }

        .questions-column {
            flex: 1;
            margin: 0 5px;
        }

        .question-cell {
            background: linear-gradient(145deg, #303f9f, #283593);
            height: 90px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 6px 0 #1a237e;
            color: #ffeb3b;
            text-shadow: 2px 2px 0 #000;
        }

        .question-cell:hover {
            transform: translateY(-3px);
            border-color: #ffeb3b;
            box-shadow: 0 9px 0 #1a237e;
        }

        .question-cell.used {
            background: linear-gradient(145deg, #424242, #212121);
            color: #666;
            cursor: not-allowed;
            box-shadow: 0 4px 0 #000;
            transform: none;
            border-color: transparent;
        }

        .question-cell.used.correct {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            color: #a5d6a7;
        }

        .question-cell.used.wrong {
            background: linear-gradient(145deg, #c62828, #b71c1c);
            color: #ffcdd2;
        }

        .question-cell.used:hover {
            transform: none;
            border-color: transparent;
        }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .control-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            border: 3px solid #d32f2f;
            min-width: 350px;
        }

        .panel-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: #ff9800;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        /* ОКНО ВОПРОСА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #0d47a1, #311b92);
            width: 90%;
            max-width: 1100px;
            padding: 40px;
            border-radius: 20px;
            border: 5px solid #ffeb3b;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 235, 59, 0.5);
        }

        .question-price {
            position: absolute;
            top: -25px;
            right: 30px;
            background: #ff4081;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #c60055;
        }

        #questionText {
            font-size: 2.2rem;
            line-height: 1.4;
            margin-bottom: 30px;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        /* ОБНОВЛЁННЫЙ АУДИО ПЛЕЕР */
        .audio-player-container {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border-left: 5px solid #9c27b0;
        }

        .audio-player {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .audio-buttons {
            display: flex;
            gap: 10px;
        }

        .audio-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(to bottom, #9c27b0, #7b1fa2);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .audio-btn:hover {
            background: linear-gradient(to bottom, #ba68c8, #9c27b0);
            transform: scale(1.1);
        }

        .audio-btn:active {
            transform: scale(0.95);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 10px;
        }

        .volume-slider {
            width: 80px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #9c27b0;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #9c27b0;
            cursor: pointer;
            border: none;
        }

        /* ПОЛЗУНОК ПРОГРЕССА */
        .progress-control {
            width: 100%;
            margin: 10px 0;
        }

        .progress-slider {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e6e0e7;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(156, 39, 176, 0.8);
            margin-top: -5px;
        }

        .progress-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e6e0e7;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(156, 39, 176, 0.8);
            margin-top: -5px;
        }

        .progress-slider::-webkit-slider-runnable-track {
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right, #9c27b0, #7b1fa2);
        }

        .audio-time {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 15px;
        }

        .current-time, .duration {
            font-family: 'Courier New', monospace;
        }



        /* ВИЗУАЛЬНЫЙ ВОПРОС */
        .image-container {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border-left: 5px solid #4caf50;
            text-align: center;
        }

        .question-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 0 auto;
            display: block;
        }

        .image-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .image-btn {
            padding: 10px 20px;
            background: linear-gradient(to bottom, #2196f3, #1976d2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .image-btn:hover {
            background: linear-gradient(to bottom, #42a5f5, #2196f3);
            transform: translateY(-2px);
        }

        /* ЭФФЕКТЫ ДЛЯ ИЗОБРАЖЕНИЙ */
        .pixelated {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .blurred {
            filter: blur(15px);
        }

        .partial {
            clip-path: circle(30% at 50% 50%);
        }

        .darkened {
            filter: brightness(0.3);
        }

        .answer-section {
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 5px solid #4caf50;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #answerText {
            font-size: 1.8rem;
            color: #4caf50;
            text-align: center;
            display: none;
        }

        /* ТАЙМЕР-ПОЛОСКА */
        .timer-section {
            margin: 30px 0;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .progress-bar {
            flex: 1;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #4caf50, #8bc34a);
            border-radius: 20px;
            transition: width 1s linear, background-color 0.5s;
        }

        .timer-text {
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }

        .timer-button {
            padding: 12px 30px;
            background: linear-gradient(to bottom, #2196f3, #1976d2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .timer-button:hover {
            background: linear-gradient(to bottom, #42a5f5, #2196f3);
            transform: translateY(-2px);
        }

        .timer-button:active {
            transform: translateY(0);
        }

        .timer-button.stop {
            background: linear-gradient(to bottom, #f44336, #d32f2f);
        }

        .timer-button.stop:hover {
            background: linear-gradient(to bottom, #ef5350, #f44336);
        }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .modal-btn {
            flex: 1;
            min-width: 150px;
            padding: 16px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .modal-btn i {
            font-size: 1.2rem;
        }

        .btn-show-answer {
            background: linear-gradient(to bottom, #9c27b0, #7b1fa2);
            color: white;
        }

        .btn-correct {
            background: linear-gradient(to bottom, #4caf50, #388e3c);
            color: white;
        }

        .btn-wrong {
            background: linear-gradient(to bottom, #f44336, #d32f2f);
            color: white;
        }

        .btn-close {
            background: linear-gradient(to bottom, #757575, #616161);
            color: white;
        }

        .btn-show-answer:hover { background: linear-gradient(to bottom, #ba68c8, #9c27b0); }
        .btn-correct:hover { background: linear-gradient(to bottom, #66bb6a, #4caf50); }
        .btn-wrong:hover { background: linear-gradient(to bottom, #ef5350, #f44336); }
        .btn-close:hover { background: linear-gradient(to bottom, #9e9e9e, #757575); }

        .btn-show-answer:disabled,
        .btn-correct:disabled,
        .btn-wrong:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ИГРОКИ */
        .players-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .player.active {
            border-color: #ffeb3b;
            background: rgba(255, 235, 59, 0.1);
        }

        .player-header {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-name-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid transparent;
            transition: all 0.3s;
            min-width: 0;
        }

        .player-name-input:focus {
            outline: none;
            border-color: #2196f3;
            background: rgba(33, 150, 243, 0.1);
        }

        .player-name-input:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .player-controls {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .score-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
        }

        .btn-score {
            width: 45px;
            height: 45px;
            padding: 0;
            font-size: 1.5rem;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-plus {
            background: #4caf50;
        }

        .btn-minus {
            background: #f44336;
        }

        .btn-plus:hover { background: #66bb6a; transform: scale(1.1); }
        .btn-minus:hover { background: #ef5350; transform: scale(1.1); }

        .score-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .player-score {
            font-size: 2rem;
            font-weight: bold;
            color: #ffeb3b;
            min-width: 120px;
            text-align: right;
            padding: 0 10px;
            font-family: 'Courier New', monospace;
        }

        .negative-score {
            color: #ff5252;
        }

        .player-main-controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-add-player {
            padding: 12px 20px;
            background: linear-gradient(to bottom, #2196f3, #1976d2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-reset-scores {
            padding: 12px 20px;
            background: linear-gradient(to bottom, #ff9800, #f57c00);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add-player:hover { background: linear-gradient(to bottom, #42a5f5, #2196f3); }
        .btn-reset-scores:hover { background: linear-gradient(to bottom, #ffb74d, #ff9800); }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 1200px) {
            .game-area {
                flex-direction: column;
            }
            
            .question-cell {
                height: 70px;
                font-size: 1.8rem;
            }
            
            .modal-content {
                padding: 30px;
            }
            
            #questionText {
                font-size: 1.8rem;
            }
            
            .player-controls {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }
            
            .score-controls {
                justify-content: center;
            }
            
            .player-score {
                text-align: center;
                min-width: auto;
                font-size: 1.8rem;
            }
            
            .audio-controls {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            
            .volume-control {
                margin-left: 0;
            }
        }

        @media (max-width: 768px) {
            .question-cell {
                height: 60px;
                font-size: 1.5rem;
            }
            
            .topic {
                font-size: 1rem;
                padding: 15px 5px;
            }
            
            #questionText {
                font-size: 1.6rem;
                min-height: 120px;
            }
            
            .modal-buttons {
                flex-direction: column;
            }
            
            .modal-btn {
                min-width: 100%;
            }
            
            .player-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            
            .player-controls {
                flex-direction: column;
                gap: 10px;
            }
            
            .score-controls {
                justify-content: center;
            }
            
            .audio-buttons {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .image-controls {
                flex-wrap: wrap;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>СВОЯ ИГРА</h1>
        </header>

        <div class="game-area">
            <!-- ИГРОВОЕ ПОЛЕ -->
            <div class="game-board">
                <div class="topics-row">
                    <div class="topic">История</div>
                    <div class="topic">Наука</div>
                    <div class="topic">Музыка</div>
                    <div class="topic">Картинки</div>
                    <div class="topic">Кино</div>
                </div>
                
                <div class="questions-grid" id="questionsGrid">
                    <!-- Вопросы генерируются через JS -->
                </div>
            </div>

            <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
            <div class="control-panel">
                <div class="panel-section">
                    <h2>ИГРОКИ</h2>
                    <div class="players-container" id="playersContainer">
                        <!-- Игроки добавляются через JS -->
                    </div>
                    
                    <div class="player-main-controls">
                        <button class="btn-add-player" id="addPlayer">
                            <i class="fas fa-user-plus"></i> Добавить игрока
                        </button>
                        <button class="btn-reset-scores" id="resetScores">
                            <i class="fas fa-redo"></i> Обнулить счёт
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ВОПРОСА -->
    <div class="modal" id="questionModal">
        <div class="modal-content">
            <div class="question-price" id="questionPrice">100</div>
            
            <div id="questionText">Текст вопроса появится здесь</div>
            
            <!-- ОБНОВЛЁННЫЙ АУДИО ПЛЕЕР -->
            <div class="audio-player-container" id="audioPlayerContainer" style="display: none;">
                
                <div class="audio-player">
                    <!-- Ползунок прогресса -->
                    <div class="progress-control">
                        <input type="range" min="0" max="100" value="0" class="progress-slider" id="progressSlider">
                        <div class="audio-time">
                            <span class="current-time" id="currentTime">0:00</span>
                            <span class="duration" id="durationTime">0:00</span>
                        </div>
                    </div>
                    
                    <!-- Кнопки управления и громкость -->
                    <div class="audio-controls">
                        <div class="audio-buttons">
                            <button class="audio-btn" id="playAudio">
                                <i class="fas fa-play"></i>
                            </button>
                            <button class="audio-btn" id="pauseAudio" style="display: none;">
                                <i class="fas fa-pause"></i>
                            </button>
                            <button class="audio-btn" id="stopAudio">
                                <i class="fas fa-stop"></i>
                            </button>
                            <button class="audio-btn" id="replayAudio" title="Воспроизвести заново">
                                <i class="fas fa-redo"></i>
                            </button>
                        </div>
                        
                        <!-- Ползунок громкости -->
                        <div class="volume-control">
                            <i class="fas fa-volume-up" id="volumeIcon"></i>
                            <input type="range" min="0" max="100" value="50" class="volume-slider" id="volumeSlider">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- ИЗОБРАЖЕНИЕ (для визуальных вопросов) -->
            <div class="image-container" id="imageContainer" style="display: none;">
                <h3><i class="fas fa-image"></i> Посмотрите на изображение:</h3>
                <img id="questionImage" class="question-image" src="" alt="Вопрос с изображением">
                <div class="image-controls">
                    <button class="image-btn" id="showFullImage">
                        <i class="fas fa-expand"></i> Показать полностью
                    </button>
                    <button class="image-btn" id="hideImage">
                        <i class="fas fa-eye-slash"></i> Скрыть
                    </button>
                </div>
            </div>
            
            <div class="answer-section">
                <div id="answerText">Правильный ответ появится здесь</div>
            </div>
            
            <!-- ТАЙМЕР-ПОЛОСКА -->
            <div class="timer-section">
                <div class="timer-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="timer-text" id="timerText">60 сек</div>
                    <button class="timer-button" id="timerControl">
                        <i class="fas fa-play"></i> Запустить
                    </button>
                </div>
            </div>
            
            <!-- КНОПКИ УПРАВЛЕНИЯ -->
            <div class="modal-buttons">
                <button class="modal-btn btn-show-answer" id="showAnswer" disabled>
                    <i class="fas fa-eye"></i> Показать ответ
                </button>
                <button class="modal-btn btn-correct" id="correctAnswer" disabled>
                    <i class="fas fa-check-circle"></i> Засчитать ответ
                </button>
                <button class="modal-btn btn-wrong" id="wrongAnswer" disabled>
                    <i class="fas fa-times-circle"></i> Списать очки
                </button>
                <button class="modal-btn btn-close" id="closeModal">
                    <i class="fas fa-times"></i> Закрыть
                </button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ИГРЫ ==========
        const gameData = [
            {
                topic: "История",
                questions: [
                    { price: 100, question: "В каком году началась Вторая мировая война?", answer: "1939" },

            },
            {

                    { price: 500, question: "Сколько хромосом у человека?", answer: "46" }

            },
            {

                    },
                    {

                        answer: "The Beatles",
                        audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
                    }
                ]
            },
            {
                topic: "Картинки",
                questions: [
                    { 
                        price: 100, 
                        question: "Что изображено на картине?", 
                        answer: "Чёрный квадрат Малевича",
                        image: "https://via.placeholder.com/600x400/000000/FFFFFF?text=Черный+квадрат",
                        imageEffect: "darkened"
                    },
                    {

                        question: "Чей это портрет?", 
                        answer: "Мона Лиза (Джоконда)",
                        image: "https://via.placeholder.com/600x400/8B4513/FFFFFF?text=Мона+Лиза",
                        imageEffect: "partial"
                    },
                    { 
                        price: 300, 
                        question: "Какой это памятник?", 
                        answer: "Статуя Свободы",
                        image: "https://via.placeholder.com/600x400/1E90FF/FFFFFF?text=Статуя+Свободы",
                        imageEffect: "blurred"
                    },
                    { 
                        price: 400, 
                        question: "Что за животное?", 
                        answer: "Большая панда",
                        image: "https://via.placeholder.com/600x400/000000/FFFFFF?text=Панда",
                        imageEffect: "pixelated"
                    },
                    { 
                        price: 500, 
                        question: "Как называется это здание?", 
                        answer: "Собор Василия Блаженного",
                        image: "https://via.placeholder.com/600x400/FF4500/FFFFFF?text=Собор+Василия+Блаженного",
                        imageEffect: "blurred"
                    }
                ]
            },
            {
                topic: "Кино",
                questions: [
                    { price: 100, question: "Кто режиссёр фильма 'Титаник'?", answer: "Джеймс Кэмерон" },
                    { price: 200, question: "Какой актёр сыграл роль Тони Старка в MCU?", answer: "Роберт Дауни-младший" },
                    { price: 300, question: "Сколько фильмов в саге 'Гарри Поттер'?", answer: "8" },
                    { price: 400, question: "Кто сыграл Нео в 'Матрице'?", answer: "Киану Ривз" },
                    { price: 500, question: "Какой фильм получил Оскар за лучший фильм 2020?", answer: "Паразиты" }
                ]
            }
        ];

        // ========== СОСТОЯНИЕ ИГРЫ ==========
        let players = [
            { name: "Игрок 1", score: 0, active: true },
            { name: "Игрок 2", score: 0, active: false }
        ];

        let timerInterval = null;
        let timeLeft = 60;
        let totalTime = 60;
        let currentQuestion = null;
        let currentCell = null;
        let audioPlayer = null;
        let imageOriginalSrc = "";
        let isDraggingProgress = false;

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', function() {
            initGameBoard();
            initPlayers();
            initEventListeners();
            initAudioPlayer();
            initImageControls();
        });

        // ========== СОЗДАНИЕ ИГРОВОГО ПОЛЯ ==========
        function initGameBoard() {
            const grid = document.getElementById('questionsGrid');
            grid.innerHTML = '';
            
            // Создаём 5 колонок
            for (let col = 0; col < 5; col++) {
                const column = document.createElement('div');
                column.className = 'questions-column';
                
                // Создаём 5 ячеек в колонке (100-500)
                for (let row = 0; row < 5; row++) {
                    const price = (row + 1) * 100;
                    const cell = document.createElement('div');
                    cell.className = 'question-cell';
                    cell.textContent = price;
                    cell.dataset.topic = col;
                    cell.dataset.question = row;
                    
                    cell.addEventListener('click', function() {
                        openQuestion(col, row, cell);
                    });
                    
                    column.appendChild(cell);
                }
                
                grid.appendChild(column);
            }
        }

        // ========== ОТКРЫТИЕ ВОПРОСА ==========
        function openQuestion(topicIndex, questionIndex, cell) {
            // Если вопрос уже использован
            if (cell.classList.contains('used')) return;
            
            currentQuestion = gameData[topicIndex].questions[questionIndex];
            currentCell = cell;
            
            // Обновляем модальное окно
            document.getElementById('questionText').textContent = currentQuestion.question;
            document.getElementById('answerText').textContent = currentQuestion.answer;
            document.getElementById('questionPrice').textContent = currentQuestion.price;
            
            // Скрываем/показываем аудиоплеер
            const audioContainer = document.getElementById('audioPlayerContainer');
            if (currentQuestion.audio) {
                audioContainer.style.display = 'block';
                loadAudio(currentQuestion.audio);
            } else {
                audioContainer.style.display = 'none';
                if (audioPlayer) {
                    stopAudio();
                }
            }
            
            // Скрываем/показываем изображение
            const imageContainer = document.getElementById('imageContainer');
            const questionImage = document.getElementById('questionImage');
            if (currentQuestion.image) {
                imageContainer.style.display = 'block';
                imageOriginalSrc = currentQuestion.image;
                
                // Применяем эффект к изображению
                questionImage.src = currentQuestion.image;
                questionImage.className = 'question-image';
                
                if (currentQuestion.imageEffect) {
                    questionImage.classList.add(currentQuestion.imageEffect);
                }
            } else {
                imageContainer.style.display = 'none';
                questionImage.src = '';
            }
            
            // Сбрасываем состояние
            resetTimerDisplay();
            document.getElementById('answerText').style.display = 'none';
            document.getElementById('showAnswer').disabled = true;
            document.getElementById('correctAnswer').disabled = true;
            document.getElementById('wrongAnswer').disabled = true;
            document.getElementById('timerControl').innerHTML = '<i class="fas fa-play"></i> Запустить';
            document.getElementById('timerControl').classList.remove('stop');
            
            // Показываем модальное окно
            document.getElementById('questionModal').style.display = 'flex';
        }

        // ========== ОБНОВЛЁННЫЙ АУДИО ПЛЕЕР ==========
        function initAudioPlayer() {
            audioPlayer = new Audio();
            audioPlayer.volume = 0.5;
            
            // Обновляем время воспроизведения и ползунок
            audioPlayer.addEventListener('timeupdate', updateProgress);
            
            // Обновляем длительность трека
            audioPlayer.addEventListener('loadedmetadata', function() {
                document.getElementById('durationTime').textContent = formatTime(audioPlayer.duration);
                document.getElementById('progressSlider').max = 100;
            });
            
            // Автоматическое переключение кнопок Play/Pause
            audioPlayer.addEventListener('play', function() {
                document.getElementById('playAudio').style.display = 'none';
                document.getElementById('pauseAudio').style.display = 'flex';
            });
            
            audioPlayer.addEventListener('pause', function() {
                document.getElementById('playAudio').style.display = 'flex';
                document.getElementById('pauseAudio').style.display = 'none';
            });
            
            // Сброс при окончании трека
            audioPlayer.addEventListener('ended', function() {
                document.getElementById('playAudio').style.display = 'flex';
                document.getElementById('pauseAudio').style.display = 'none';
                document.getElementById('progressSlider').value = 0;
                document.getElementById('currentTime').textContent = "0:00";
            });
        }

        function initEventListeners() {
            // Таймер
            document.getElementById('timerControl').addEventListener('click', toggleTimer);
            
            // Модальное окно
            document.getElementById('showAnswer').addEventListener('click', showAnswer);
            document.getElementById('correctAnswer').addEventListener('click', markCorrect);
            document.getElementById('wrongAnswer').addEventListener('click', markWrong);
            document.getElementById('closeModal').addEventListener('click', closeModal);
            
            // Игроки
            document.getElementById('addPlayer').addEventListener('click', addPlayer);
            document.getElementById('resetScores').addEventListener('click', resetScores);
            
            // Аудио
            document.getElementById('playAudio').addEventListener('click', playAudio);
            document.getElementById('pauseAudio').addEventListener('click', pauseAudio);
            document.getElementById('stopAudio').addEventListener('click', stopAudio);
            document.getElementById('replayAudio').addEventListener('click', replayAudio);
            document.getElementById('volumeSlider').addEventListener('input', changeVolume);
            
            // Ползунок прогресса
            const progressSlider = document.getElementById('progressSlider');
            progressSlider.addEventListener('input', function() {
                isDraggingProgress = true;
            });
            
            progressSlider.addEventListener('change', function() {
                if (audioPlayer && currentQuestion.audio) {
                    const value = this.value;
                    const duration = audioPlayer.duration;
                    audioPlayer.currentTime = (value / 100) * duration;
                }
                isDraggingProgress = false;
            });
            
            // Изображения
            document.getElementById('showFullImage').addEventListener('click', showFullImage);
            document.getElementById('hideImage').addEventListener('click', hideImage);
            
            // Закрытие модального окна по клику вне
            document.getElementById('questionModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
        }

        function loadAudio(audioUrl) {
            if (audioPlayer) {
                stopAudio();
                audioPlayer.src = audioUrl;
                document.getElementById('currentTime').textContent = "0:00";
                document.getElementById('durationTime').textContent = "0:00";
                document.getElementById('progressSlider').value = 0;
                
                // Сбрасываем кнопки
                document.getElementById('playAudio').style.display = 'flex';
                document.getElementById('pauseAudio').style.display = 'none';
            }
        }

        function updateProgress() {
            if (!audioPlayer || isDraggingProgress) return;
            
            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            
            if (duration) {
                const progressPercent = (currentTime / duration) * 100;
                document.getElementById('progressSlider').value = progressPercent;
                document.getElementById('currentTime').textContent = formatTime(currentTime);
            }
        }

        function playAudio() {
            if (audioPlayer && currentQuestion.audio) {
                audioPlayer.play().catch(e => {
                    console.log("Ошибка воспроизведения:", e);
                    alert("Не удалось воспроизвести аудио. Проверьте ссылку или подключение к интернету.");
                });
            }
        }

        function pauseAudio() {
            if (audioPlayer) {
                audioPlayer.pause();
            }
        }

        function stopAudio() {
            if (audioPlayer) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                document.getElementById('progressSlider').value = 0;
                document.getElementById('currentTime').textContent = "0:00";
                document.getElementById('playAudio').style.display = 'flex';
                document.getElementById('pauseAudio').style.display = 'none';
            }
        }

        function replayAudio() {
            if (audioPlayer) {
                audioPlayer.currentTime = 0;
                audioPlayer.play().catch(e => {
                    console.log("Ошибка воспроизведения:", e);
                });
            }
        }

        function changeVolume() {
            if (audioPlayer) {
                const volume = document.getElementById('volumeSlider').value / 100;
                audioPlayer.volume = volume;
                
                // Обновляем иконку громкости
                const volumeIcon = document.getElementById('volumeIcon');
                if (volume === 0) {
                    volumeIcon.className = 'fas fa-volume-mute';
                } else if (volume < 0.5) {
                    volumeIcon.className = 'fas fa-volume-down';
                } else {
                    volumeIcon.className = 'fas fa-volume-up';
                }
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ========== УПРАВЛЕНИЕ ИЗОБРАЖЕНИЯМИ ==========
        function initImageControls() {
            // Уже добавлено в initEventListeners
        }

        function showFullImage() {
            const img = document.getElementById('questionImage');
            img.classList.remove('pixelated', 'blurred', 'partial', 'darkened');
            img.style.maxHeight = '500px';
        }

        function hideImage() {
            const img = document.getElementById('questionImage');
            if (currentQuestion && currentQuestion.imageEffect) {
                img.classList.add(currentQuestion.imageEffect);
            }
        }

        // ========== ТАЙМЕР ==========
        function toggleTimer() {
            if (timerInterval) {
                stopTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (timerInterval) return;
            
            const timerControl = document.getElementById('timerControl');
            timerControl.innerHTML = '<i class="fas fa-pause"></i> Стоп';
            timerControl.classList.add('stop');
            
            document.getElementById('showAnswer').disabled = false;
            
            const startTime = Date.now();
            const duration = totalTime * 1000;
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Обновляем полосу
                const progressFill = document.getElementById('progressFill');
                progressFill.style.width = (progress * 100) + '%';
                
                // Обновляем текст
                const remaining = Math.ceil(totalTime * (1 - progress));
                document.getElementById('timerText').textContent = remaining + ' сек';
                
                // Меняем цвет полосы
                if (progress < 0.5) {
                    progressFill.style.background = 'linear-gradient(to right, #4caf50, #8bc34a)';
                } else if (progress < 0.75) {
                    progressFill.style.background = 'linear-gradient(to right, #ff9800, #ffb74d)';
                } else {
                    progressFill.style.background = 'linear-gradient(to right, #f44336, #ef5350)';
                }
                
                // Конец таймера
                if (progress >= 1) {
                    stopTimer();
                    blinkTimer();
                    playSound('timeout');
                    document.getElementById('showAnswer').disabled = false;
                    document.getElementById('correctAnswer').disabled = false;
                    document.getElementById('wrongAnswer').disabled = false;
                }
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                
                const timerControl = document.getElementById('timerControl');
                timerControl.innerHTML = '<i class="fas fa-play"></i> Запустить';
                timerControl.classList.remove('stop');
            }
        }

        function resetTimerDisplay() {
            stopTimer();
            timeLeft = totalTime;
            
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = '0%';
            progressFill.style.background = 'linear-gradient(to right, #4caf50, #8bc34a)';
            
            document.getElementById('timerText').textContent = totalTime + ' сек';
        }

        function blinkTimer() {
            const progressFill = document.getElementById('progressFill');
            let blinkCount = 0;
            const blinkInterval = setInterval(() => {
                progressFill.style.opacity = progressFill.style.opacity === '0.5' ? '1' : '0.5';
                blinkCount++;
                
                if (blinkCount >= 6) {
                    clearInterval(blinkInterval);
                    progressFill.style.opacity = '1';
                }
            }, 300);
        }

        // ========== УПРАВЛЕНИЕ ОТВЕТАМИ ==========
        function showAnswer() {
            document.getElementById('answerText').style.display = 'block';
            document.getElementById('correctAnswer').disabled = false;
            document.getElementById('wrongAnswer').disabled = false;
            playSound('reveal');
        }

        function markCorrect() {
            if (!currentQuestion || !currentCell) return;
            
            const activePlayer = players.find(p => p.active);
            if (activePlayer) {
                activePlayer.score += currentQuestion.price;
                initPlayers();
            }
            
            currentCell.classList.add('used', 'correct');
            currentCell.textContent = '✓';
            playSound('correct');
            closeModal();
        }

        function markWrong() {
            if (!currentQuestion || !currentCell) return;
            
            const activePlayer = players.find(p => p.active);
            if (activePlayer) {
                activePlayer.score -= currentQuestion.price;
                initPlayers();
            }
            
            currentCell.classList.add('used', 'wrong');
            currentCell.textContent = '✗';
            playSound('wrong');
            closeModal();
        }

        function closeModal() {
            if (!currentCell.classList.contains('used')) {
                currentCell.classList.add('used');
                currentCell.textContent = '•';
            }
            
            // Останавливаем аудио при закрытии
            if (audioPlayer) {
                stopAudio();
            }
            
            document.getElementById('questionModal').style.display = 'none';
            resetTimerDisplay();
            
            currentQuestion = null;
            currentCell = null;
        }

        // ========== ИГРОКИ ==========
        function initPlayers() {
            const container = document.getElementById('playersContainer');
            container.innerHTML = '';
            
            players.forEach((player, index) => {
                const playerElement = document.createElement('div');
                playerElement.className = `player ${player.active ? 'active' : ''}`;
                
                // Определяем цвет счёта (красный для отрицательных)
                const scoreClass = player.score < 0 ? 'player-score negative-score' : 'player-score';
                
                playerElement.innerHTML = `
                    <div class="player-header">
                        <input type="text" class="player-name-input" value="${player.name}" 
                               onchange="updatePlayerName(${index}, this.value)"
                               onclick="event.stopPropagation();"
                               onfocus="event.target.select()">
                    </div>
                    <div class="player-controls">
                        <div class="score-controls">
                            <button class="btn-score btn-minus" onclick="changeScore(${index}, -100)" title="Убрать 100 очков">
                                <i class="fas fa-minus"></i>
                            </button>
                            <span class="score-label">Очки:</span>
                            <button class="btn-score btn-plus" onclick="changeScore(${index}, 100)" title="Добавить 100 очков">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div class="${scoreClass}">${player.score}</div>
                    </div>
                `;
                
                playerElement.querySelector('.player-header').addEventListener('click', (e) => {
                    if (e.target.classList.contains('player-name-input')) return;
                    setActivePlayer(index);
                });
                
                container.appendChild(playerElement);
            });
        }

        function setActivePlayer(index) {
            players.forEach((player, i) => {
                player.active = (i === index);
            });
            initPlayers();
        }

        function updatePlayerName(index, newName) {
            players[index].name = newName || `Игрок ${index + 1}`;
        }

        function changeScore(playerIndex, change) {
            players[playerIndex].score += change;
            
            // Анимация изменения счёта
            const scoreElements = document.querySelectorAll('.player-score');
            scoreElements[playerIndex].style.transform = 'scale(1.3)';
            setTimeout(() => {
                scoreElements[playerIndex].style.transform = 'scale(1)';
            }, 300);
            
            initPlayers();
        }

        function addPlayer() {
            const newNumber = players.length + 1;
            players.push({
                name: `Игрок ${newNumber}`,
                score: 0,
                active: false
            });
            initPlayers();
        }

        function resetScores() {
            if (confirm("Обнулить все счёты?")) {
                players.forEach(player => player.score = 0);
                initPlayers();
            }
        }

        // ========== ЗВУКИ ==========
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'reveal') {
                    playNote(audioContext, 523.25, 0, 0.2, 0.3);
                    playNote(audioContext, 659.25, 0.1, 0.2, 0.3);
                    playNote(audioContext, 783.99, 0.2, 0.2, 0.3);
                }
                else if (type === 'correct') {
                    playNote(audioContext, 392.00, 0, 0.2, 0.3);
                    playNote(audioContext, 523.25, 0.1, 0.2, 0.3);
                    playNote(audioContext, 659.25, 0.2, 0.2, 0.3);
                }
                else if (type === 'wrong') {
                    playNote(audioContext, 659.25, 0, 0.3, 0.4);
                    playNote(audioContext, 523.25, 0.1, 0.3, 0.4);
                    playNote(audioContext, 392.00, 0.2, 0.3, 0.4);
                }
                else if (type === 'timeout') {
                    playNote(audioContext, 200, 0, 0.4, 0.5);
                    playNote(audioContext, 150, 0.1, 0.4, 0.5);
                    playNote(audioContext, 100, 0.2, 0.4, 0.5);
                }
            } catch (e) {
                console.log("Браузер не поддерживает Web Audio API");
            }
        }

        function playNote(audioContext, frequency, delay, duration, volume) {
            setTimeout(() => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + duration);
            }, delay * 1000);
        }
    </script>
</body>
